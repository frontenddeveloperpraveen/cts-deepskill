<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 4.1 - Sidebar + Content</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .sidebar { background: #f8f9fa; min-height: 200px; padding: 1rem; }
    .content { background: #fff; min-height: 200px; padding: 1rem; }
  </style>
</head>
<body>
  <div class="container mt-5">
    <h1>Two-Column Layout</h1>
    <div class="row">
      <div class="col-md-3">
        <div class="sidebar border rounded">
          <h5>Sidebar</h5>
          <ul class="nav flex-column">
            <li class="nav-item"><a href="#" class="nav-link">Link 1</a></li>
            <li class="nav-item"><a href="#" class="nav-link">Link 2</a></li>
            <li class="nav-item"><a href="#" class="nav-link">Link 3</a></li>
          </ul>
        </div>
      </div>
      <div class="col-md-9">
        <div class="content border rounded">
          <h2>Main Content</h2>
          <p>This is the main content area (col-md-9). The sidebar is col-md-3.</p>
          <p>On mobile, both stack vertically (full width).</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
