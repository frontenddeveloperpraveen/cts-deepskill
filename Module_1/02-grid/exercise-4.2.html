<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 4.2 - Four Equal Columns</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .col-demo { background: #cce5ff; border: 1px solid #b8daff; padding: 1.5rem; text-align: center; }
  </style>
</head>
<body>
  <div class="container mt-5">
    <h1>Four Equal Columns</h1>
    <div class="row">
      <div class="col-sm-3"><div class="col-demo">col-sm-3</div></div>
      <div class="col-sm-3"><div class="col-demo">col-sm-3</div></div>
      <div class="col-sm-3"><div class="col-demo">col-sm-3</div></div>
      <div class="col-sm-3"><div class="col-demo">col-sm-3</div></div>
    </div>
    <p class="mt-2">On mobile (<sm), each column takes full width (stacked).</p>
  </div>
</body>
</html>
