<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 5.2 - Column Reordering</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .col-demo { padding: 1.5rem; text-align: center; color: #fff; }
  </style>
</head>
<body>
  <div class="container mt-5">
    <h1>Column Reordering</h1>
    <div class="row">
      <div class="col-md-4 order-md-2"><div class="col-demo bg-primary">Middle (order-md-2)</div></div>
      <div class="col-md-4 order-md-3"><div class="col-demo bg-success">Right (order-md-3)</div></div>
      <div class="col-md-4 order-md-1"><div class="col-demo bg-warning text-dark">Left (order-md-1)</div></div>
    </div>
    <p>On mobile: Left, Middle, Right. On md+: Left, Middle, Right (reordered via order-md-*).</p>
  </div>
</body>
</html>
