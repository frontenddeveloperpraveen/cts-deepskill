<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 7.2 (6.2) - Card with Flex Utilities</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1>Card with Flex Utilities</h1>
    <div class="row">
      <div class="col-md-4">
        <div class="card">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title">Basic Plan</h5>
            <p class="card-text">Perfect for getting started with basic features.</p>
            <div class="mt-auto d-flex justify-content-between align-items-center">
              <span class="fw-bold fs-4">$9/mo</span>
              <a href="#" class="btn btn-primary">Select</a>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card border-primary">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title">Pro Plan</h5>
            <p class="card-text">Advanced features for professionals and teams.</p>
            <div class="mt-auto d-flex justify-content-between align-items-center">
              <span class="fw-bold fs-4">$29/mo</span>
              <a href="#" class="btn btn-primary">Select</a>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title">Enterprise</h5>
            <p class="card-text">Full-featured plan for large organizations.</p>
            <div class="mt-auto d-flex justify-content-between align-items-center">
              <span class="fw-bold fs-4">$99/mo</span>
              <a href="#" class="btn btn-primary">Select</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
