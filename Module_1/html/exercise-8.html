<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save Preferences</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    label { display: block; margin-top: 1rem; font-weight: bold; }
    select { width: 100%; padding: 0.5rem; margin-top: 0.25rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { margin-top: 1.5rem; padding: 0.75rem 1.5rem; background: #0056a0; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #003d73; }
    .btn-danger { background: #dc3545; }
    .btn-danger:hover { background: #b02a37; }
    .pref-status { margin-top: 1rem; padding: 0.75rem; background: #e9ecef; border-radius: 6px; }
  </style>
</head>
<body>
  <header>
    <h1>User Preferences</h1>
  </header>
  <main>
    <p>Your preferred event type is saved locally and restored on your next visit.</p>

    <label for="prefEvent">Preferred Event Type</label>
    <select id="prefEvent">
      <option value="">Select...</option>
      <option value="Clean-Up">Clean-Up</option>
      <option value="Charity Run">Charity Run</option>
      <option value="Workshop">Workshop</option>
      <option value="Festival">Festival</option>
    </select>

    <button onclick="localStorage.setItem('prefEvent', document.getElementById('prefEvent').value); sessionStorage.setItem('lastVisit', new Date().toISOString()); alert('Preferences saved!')">Save Preferences</button>
    <button class="btn-danger" onclick="localStorage.clear(); sessionStorage.clear(); document.getElementById('prefEvent').value = ''; alert('All preferences cleared!')">Clear Preferences</button>

    <div class="pref-status">
      <strong>Stored Preference:</strong> <span id="storedPref">None</span><br>
      <strong>Last Visit (session):</strong> <span id="lastVisit">None</span>
    </div>
  </main>
  <footer>
    <p>&copy; 2026 City Council</p>
  </footer>
  <script>
    window.onload = function() {
      var saved = localStorage.getItem('prefEvent');
      if (saved) {
        document.getElementById('prefEvent').value = saved;
        document.getElementById('storedPref').textContent = saved;
      }
      var last = sessionStorage.getItem('lastVisit');
      if (last) document.getElementById('lastVisit').textContent = last;
    };
    document.getElementById('prefEvent').onchange = function() {
      document.getElementById('storedPref').textContent = this.value || 'None';
    };
  </script>
</body>
</html>
