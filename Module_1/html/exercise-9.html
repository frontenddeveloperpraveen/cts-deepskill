<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Nearby Events</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    button { padding: 0.75rem 2rem; background: #28a745; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #218838; }
    .result { margin-top: 1rem; padding: 1rem; background: #e9ecef; border-radius: 8px; }
    .error { background: #f8d7da; color: #721c24; }
    .success { background: #d4edda; color: #155724; }
    #map { margin-top: 1rem; width: 100%; height: 300px; background: #f1f1f1; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #6c757d; }
  </style>
</head>
<body>
  <header>
    <h1>Find Nearby Events</h1>
  </header>
  <main>
    <p>Click the button to find events near your location.</p>
    <button onclick="findLocation()">Find Nearby Events</button>

    <div class="result" id="geoResult">Click the button above to get your location.</div>

    <div id="map">Map will display coordinates here</div>
  </main>
  <footer>
    <p>&copy; 2026 City Council</p>
  </footer>
  <script>
    function findLocation() {
      var result = document.getElementById('geoResult');
      var map = document.getElementById('map');

      if (!navigator.geolocation) {
        result.className = 'result error';
        result.textContent = 'Geolocation is not supported by your browser.';
        return;
      }

      result.className = 'result';
      result.textContent = 'Locating...';

      navigator.geolocation.getCurrentPosition(
        function(pos) {
          var lat = pos.coords.latitude.toFixed(6);
          var lng = pos.coords.longitude.toFixed(6);
          result.className = 'result success';
          result.innerHTML = '<strong>Location found!</strong><br>Latitude: ' + lat + '<br>Longitude: ' + lng + '<br>Accuracy: ' + pos.coords.accuracy + ' meters';
          map.innerHTML = '<iframe width="100%" height="100%" frameborder="0" src="https://www.openstreetmap.org/export/embed.html?bbox=' + (lng - 0.02) + ',' + (lat - 0.02) + ',' + (lng + 0.02) + ',' + (lat + 0.02) + '&layer=mapnik"></iframe>';
        },
        function(err) {
          result.className = 'result error';
          switch(err.code) {
            case err.PERMISSION_DENIED: result.textContent = 'Permission denied. Enable location access and try again.'; break;
            case err.POSITION_UNAVAILABLE: result.textContent = 'Location unavailable. Try again later.'; break;
            case err.TIMEOUT: result.textContent = 'Request timed out. Check your connection.'; break;
            default: result.textContent = 'An unknown error occurred.';
          }
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }
  </script>
</body>
</html>
