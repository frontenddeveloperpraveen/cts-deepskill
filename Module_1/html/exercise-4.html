<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Image Gallery</title>
  <style>
    .gallery-img {
      width: 200px;
      height: 150px;
      border: 3px solid #0056a0;
      border-radius: 6px;
      object-fit: cover;
    }
    table { margin: 2rem auto; border-collapse: collapse; }
    td { padding: 1rem; text-align: center; }
    caption { font-size: 1.2rem; font-weight: bold; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <header>
    <h1>Past Event Gallery</h1>
  </header>
  <main>
    <table>
      <caption>Community Events 2025</caption>
      <tr>
        <td>
          <img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?w=200&h=150&fit=crop" alt="Community Clean-Up" title="Community Clean-Up" class="gallery-img">
          <br>Clean-Up Drive
        </td>
        <td>
          <img src="https://images.unsplash.com/photo-1501281668745-f7f57925c3b4?w=200&h=150&fit=crop" alt="Charity Run" title="Charity Run" class="gallery-img">
          <br>Charity Run
        </td>
        <td>
          <img src="https://images.unsplash.com/photo-1464366400600-7168b8af9bc3?w=200&h=150&fit=crop" alt="Farmers Market" title="Farmers Market" class="gallery-img">
          <br>Farmers Market
        </td>
      </tr>
      <tr>
        <td>
          <img src="https://images.unsplash.com/photo-1429962714451-bb934ecdc4ec?w=200&h=150&fit=crop" alt="Music Festival" title="Music Festival" class="gallery-img">
          <br>Music Festival
        </td>
        <td>
          <img src="https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=200&h=150&fit=crop" alt="Workshop" title="Workshop" class="gallery-img">
          <br>Community Workshop
        </td>
        <td>
          <img src="https://images.unsplash.com/photo-1472653431158-6364773b2a56?w=200&h=150&fit=crop" alt="Food Fair" title="Food Fair" class="gallery-img">
          <br>Food Fair
        </td>
      </tr>
    </table>
  </main>
  <footer>
    <p>&copy; 2026 City Council</p>
  </footer>
</body>
</html>
