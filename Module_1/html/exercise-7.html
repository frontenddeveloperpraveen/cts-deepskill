<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Video Invite</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
    video { width: 100%; border-radius: 8px; margin: 1rem 0; }
    .status { padding: 0.75rem; border-radius: 6px; font-weight: bold; }
    .ready { background: #d4edda; color: #155724; }
    .pending { background: #fff3cd; color: #856404; }
  </style>
</head>
<body onbeforeunload="return 'You have unsaved form data. Are you sure you want to leave?'">
  <header>
    <h1>Event Video Invite</h1>
  </header>
  <main>
    <p>Watch our event promo video below:</p>

    <video controls id="promoVideo" oncanplay="document.getElementById('videoStatus').textContent = 'Video ready to play'; document.getElementById('videoStatus').className = 'status ready';">
      <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <div id="videoStatus" class="status pending">Loading video...</div>

    <form>
      <label for="name" style="display:block; margin-top:1rem; font-weight:bold;">Name</label>
      <input type="text" id="name" style="width:100%; padding:0.5rem; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;">

      <label for="email" style="display:block; margin-top:1rem; font-weight:bold;">Email</label>
      <input type="email" id="email" style="width:100%; padding:0.5rem; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;">

      <p style="color: #6c757d; font-size: 0.9rem; margin-top: 0.5rem;">You will be warned if you try to leave this page with unsaved data.</p>
    </form>
  </main>
  <footer>
    <p>&copy; 2026 City Council</p>
  </footer>
</body>
</html>
