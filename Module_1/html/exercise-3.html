<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome Message</title>
  <style>
    #welcomeBanner {
      background-color: #0056a0;
      color: #fff;
      padding: 2rem;
      text-align: center;
      border-radius: 8px;
    }
    .highlight {
      background-color: #ffd700;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <h1>Local Community Event Portal</h1>
  </header>
  <main>
    <div id="welcomeBanner">
      <h2>Welcome back, Resident!</h2>
      <p>Check out the latest events and <span style="color: red; font-weight: bold;">limited-time offers</span> just for you.</p>
    </div>
    <p class="highlight">This is a highlighted announcement.</p>
    <p>Don't miss the <span class="highlight">Community Clean-Up</span> this Saturday.</p>
    <p>Also check out the <span class="highlight">Charity Run</span> next weekend.</p>
  </main>
  <footer>
    <p>&copy; 2026 City Council</p>
  </footer>
</body>
</html>
