<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 9.2 - Button Groups & Toggle</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1>Button Groups</h1>
    <div class="btn-group mb-4" role="group">
      <button class="btn btn-outline-primary">Left</button>
      <button class="btn btn-primary">Middle</button>
      <button class="btn btn-outline-primary">Right</button>
    </div>

    <div class="btn-group-vertical mb-4" role="group">
      <button class="btn btn-outline-secondary">Top</button>
      <button class="btn btn-secondary">Middle</button>
      <button class="btn btn-outline-secondary">Bottom</button>
    </div>

    <h5>Checkbox Toggle Buttons</h5>
    <div class="btn-group mb-3" role="group" data-bs-toggle="buttons">
      <input type="checkbox" class="btn-check" id="check1" autocomplete="off">
      <label class="btn btn-outline-primary" for="check1">Option 1</label>
      <input type="checkbox" class="btn-check" id="check2" autocomplete="off">
      <label class="btn btn-outline-primary" for="check2">Option 2</label>
      <input type="checkbox" class="btn-check" id="check3" autocomplete="off">
      <label class="btn btn-outline-primary" for="check3">Option 3</label>
    </div>

    <h5>Radio Toggle Buttons</h5>
    <div class="btn-group" role="group" data-bs-toggle="buttons">
      <input type="radio" class="btn-check" name="radioGroup" id="radio1" autocomplete="off">
      <label class="btn btn-outline-success" for="radio1">Yes</label>
      <input type="radio" class="btn-check" name="radioGroup" id="radio2" autocomplete="off">
      <label class="btn btn-outline-danger" for="radio2">No</label>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
