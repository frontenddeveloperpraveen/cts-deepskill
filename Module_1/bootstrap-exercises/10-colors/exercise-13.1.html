<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 13.1 - Dashboard with Colors</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container-fluid">
    <div class="row min-vh-100">
      <div class="col-md-2 bg-dark text-white p-3">
        <h4 class="text-white">Dashboard</h4>
        <ul class="nav flex-column">
          <li class="nav-item"><a href="#" class="nav-link text-white-50">Home</a></li>
          <li class="nav-item"><a href="#" class="nav-link text-white-50">Analytics</a></li>
          <li class="nav-item"><a href="#" class="nav-link text-white-50">Settings</a></li>
        </ul>
      </div>
      <div class="col-md-10 p-4">
        <h1>Color & Background Demo</h1>
        <div class="row g-3">
          <div class="col-md-3">
            <div class="p-3 bg-primary text-white rounded">bg-primary</div>
          </div>
          <div class="col-md-3">
            <div class="p-3 bg-success text-white rounded">bg-success</div>
          </div>
          <div class="col-md-3">
            <div class="p-3 bg-warning text-dark rounded">bg-warning</div>
          </div>
          <div class="col-md-3">
            <div class="p-3 bg-danger text-white rounded">bg-danger</div>
          </div>
          <div class="col-md-3">
            <div class="p-3 bg-info text-white rounded">bg-info</div>
          </div>
          <div class="col-md-3">
            <div class="p-3 bg-secondary text-white rounded">bg-secondary</div>
          </div>
          <div class="col-md-3">
            <div class="p-3 bg-light text-dark rounded">bg-light</div>
          </div>
          <div class="col-md-3">
            <div class="p-3 bg-dark text-white rounded">bg-dark</div>
          </div>
        </div>
        <h2 class="mt-4">Text Colors</h2>
        <p class="text-primary">.text-primary</p>
        <p class="text-success">.text-success</p>
        <p class="text-danger">.text-danger</p>
        <p class="text-warning">.text-warning</p>
        <p class="text-info">.text-info</p>
        <p class="text-muted">.text-muted</p>
      </div>
    </div>
  </div>
</body>
</html>
