<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 16.1 - Fixed Footer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1>Fixed Footer</h1>
    <p>This page has a fixed footer at the bottom using <code>position-fixed bottom-0</code>.</p>
    <p>Scroll down to see it stays in place.</p>
    <div style="height: 1000px;"></div>
  </div>

  <footer class="position-fixed bottom-0 w-100 bg-dark text-white text-center py-3">
    <p class="mb-0">&copy; 2026 Fixed Footer - Always visible at the bottom</p>
  </footer>
</body>
</html>
