<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 11.1 - Profile Card</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="card text-center">
          <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Cover photo">
          <div class="card-body">
            <img src="https://via.placeholder.com/80" class="rounded-circle mt-n5 border border-3 border-white" alt="Avatar">
            <h5 class="card-title mt-2">Jane Doe</h5>
            <p class="card-text text-muted">Full Stack Developer</p>
            <p class="card-text">Passionate about building great web experiences with Bootstrap and modern frameworks.</p>
            <div class="d-flex justify-content-center gap-2">
              <a href="#" class="btn btn-primary">Follow</a>
              <a href="#" class="btn btn-outline-secondary">Message</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
