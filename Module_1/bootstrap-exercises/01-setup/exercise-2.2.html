<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 2.2 - Bootstrap JS Bundle</title>
  <link href="node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1>Exercise 2.2 - Bootstrap JS</h1>
    <p class="lead">Click the button to see a modal powered by bootstrap.bundle.min.js</p>
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#demoModal">
      Launch Modal
    </button>
  </div>

  <div class="modal fade" id="demoModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Modal Demo</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p>Bootstrap JavaScript is working via bootstrap.bundle.min.js!</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
