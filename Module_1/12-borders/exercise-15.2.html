<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 15.2 - Shadows & Rounded</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1>Shadows & Rounded Corners</h1>
    <div class="row g-4">
      <div class="col-md-4">
        <div class="card shadow-sm rounded-pill p-4 text-center">
          <p class="mb-0">shadow-sm + rounded-pill</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card shadow p-4 text-center">
          <p class="mb-0">shadow (default)</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card shadow-lg p-4 text-center">
          <p class="mb-0">shadow-lg</p>
        </div>
      </div>
    </div>
    <div class="row g-4 mt-3">
      <div class="col-md-3">
        <div class="p-4 border rounded">rounded</div>
      </div>
      <div class="col-md-3">
        <div class="p-4 border rounded-0">rounded-0</div>
      </div>
      <div class="col-md-3">
        <div class="p-4 border rounded-3">rounded-3</div>
      </div>
      <div class="col-md-3">
        <div class="p-4 border rounded-circle text-center" style="width:100px;height:100px;">circle</div>
      </div>
    </div>
  </div>
</body>
</html>
