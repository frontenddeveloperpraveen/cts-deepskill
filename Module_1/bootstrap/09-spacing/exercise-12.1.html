<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 12.1 - Spacing Utilities</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .box { background: #e9ecef; border: 1px solid #ced4da; }
  </style>
</head>
<body>
  <div class="container mt-5">
    <h1>Spacing Utilities</h1>

    <div class="box m-3 p-2">m-3 (margin all sides), p-2 (padding all sides)</div>
    <div class="box mt-4 mb-2 ps-5 pe-3 py-4">
      mt-4 (top), mb-2 (bottom), ps-5 (left), pe-3 (right), py-4 (top+bottom)
    </div>
    <div class="box my-5 px-3">
      my-5 (top+bottom), px-3 (left+right)
    </div>

    <h2 class="mt-5">Gap Utilities</h2>
    <div class="d-flex gap-3 flex-wrap">
      <div class="box p-3">gap-3</div>
      <div class="box p-3">gap-3</div>
      <div class="box p-3">gap-3</div>
      <div class="box p-3">gap-3</div>
    </div>
  </div>
</body>
</html>
