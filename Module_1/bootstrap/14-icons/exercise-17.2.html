<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 17.2 - Icon Buttons</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1>Icon-Only Buttons</h1>
    <p class="lead">Text buttons replaced with icon-only buttons.</p>

    <h5>Before (text buttons):</h5>
    <div class="d-flex gap-2 mb-4">
      <button class="btn btn-primary">Edit</button>
      <button class="btn btn-success">Save</button>
      <button class="btn btn-danger">Delete</button>
      <button class="btn btn-info">Search</button>
    </div>

    <h5>After (icon-only buttons):</h5>
    <div class="d-flex gap-2">
      <button class="btn btn-primary" title="Edit"><i class="bi bi-pencil-square"></i></button>
      <button class="btn btn-success" title="Save"><i class="bi bi-floppy"></i></button>
      <button class="btn btn-danger" title="Delete"><i class="bi bi-trash"></i></button>
      <button class="btn btn-info" title="Search"><i class="bi bi-search"></i></button>
      <button class="btn btn-warning" title="Settings"><i class="bi bi-gear"></i></button>
      <button class="btn btn-dark" title="Download"><i class="bi bi-download"></i></button>
    </div>

    <h5 class="mt-4">Icon + Label Combination:</h5>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-primary"><i class="bi bi-pencil-square me-1"></i> Edit</button>
      <button class="btn btn-outline-danger"><i class="bi bi-trash me-1"></i> Delete</button>
      <button class="btn btn-outline-success"><i class="bi bi-download me-1"></i> Download</button>
    </div>
  </div>
</body>
</html>
