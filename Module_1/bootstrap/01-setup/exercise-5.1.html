<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 5.1 - Centering Content</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .row { min-height: 200px; background: #f1f1f1; }
    .col-demo { background: #6f42c1; color: #fff; padding: 2rem; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="container mt-5">
    <h1>Centering with Flexbox Utilities</h1>
    <div class="row justify-content-center align-items-center">
      <div class="col-auto">
        <div class="col-demo">Centered Both Axes</div>
      </div>
    </div>
    <p class="mt-2">The row uses <code>justify-content-center</code> (horizontal) and <code>align-items-center</code> (vertical).</p>
  </div>
</body>
</html>
