<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 3.1 - Responsive Grid</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .col { background: #e9ecef; border: 1px solid #ced4da; padding: 1rem; text-align: center; }
  </style>
</head>
<body>
  <div class="container mt-5">
    <h1 class="mb-4">Responsive Grid: 1-2-3 Columns</h1>
    <div class="row">
      <div class="col-12 col-sm-6 col-md-4"><div class="col">Column 1</div></div>
      <div class="col-12 col-sm-6 col-md-4"><div class="col">Column 2</div></div>
      <div class="col-12 col-sm-6 col-md-4"><div class="col">Column 3</div></div>
      <div class="col-12 col-sm-6 col-md-4"><div class="col">Column 4</div></div>
      <div class="col-12 col-sm-6 col-md-4"><div class="col">Column 5</div></div>
      <div class="col-12 col-sm-6 col-md-4"><div class="col">Column 6</div></div>
    </div>
    <p class="mt-3">
      <strong>Behavior:</strong> Stacked on mobile (col-12),
      2 per row on tablet (col-sm-6), 3 per row on desktop (col-md-4).
    </p>
  </div>
</body>
</html>
