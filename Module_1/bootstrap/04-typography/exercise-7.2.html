<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 7.2 - Text Transform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1>Text Transform Utilities</h1>
    <ul class="list-unstyled fs-4">
      <li class="text-uppercase">this is uppercase</li>
      <li class="text-lowercase">THIS IS LOWERCASE</li>
      <li class="text-capitalize">each word starts capitalized</li>
    </ul>
    <hr>
    <div class="row">
      <div class="col-md-4">
        <div class="border p-3">
          <p class="text-uppercase fw-bold">Warning Notice</p>
          <p>Uppercase used for emphasis.</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="border p-3">
          <p class="text-capitalize fs-5">product description</p>
          <p>Capitalized text for headings.</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="border p-3">
          <p class="text-lowercase text-muted">USER EMAIL ADDRESS</p>
          <p>Lowercase for muted labels.</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
