<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 15.1 - Border Utilities</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1>Border Utilities</h1>
    <div class="d-flex gap-3 flex-wrap align-items-center mb-5">
      <img src="https://via.placeholder.com/120" class="border border-primary border-3 rounded-circle" alt="Circle image">
      <img src="https://via.placeholder.com/120" class="border border-success rounded" alt="Rounded square">
      <img src="https://via.placeholder.com/120" class="border border-danger border-5 rounded-pill" alt="Pill shape">
    </div>

    <div class="row g-3">
      <div class="col-md-3">
        <div class="p-4 border border-primary text-center">border-primary</div>
      </div>
      <div class="col-md-3">
        <div class="p-4 border border-success border-3 text-center">border-success border-3</div>
      </div>
      <div class="col-md-3">
        <div class="p-4 border-start border-warning border-5 text-center">border-start border-warning</div>
      </div>
      <div class="col-md-3">
        <div class="p-4 border border-0 border-bottom border-info border-3 text-center">bottom border only</div>
      </div>
    </div>
  </div>
</body>
</html>
