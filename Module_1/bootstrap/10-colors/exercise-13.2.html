<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 13.2 - Gradient Backgrounds</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1>Gradient Backgrounds</h1>

    <div class="p-5 mb-3 bg-dark bg-gradient text-white rounded">
      <h2>bg-dark bg-gradient</h2>
      <p>Dark background with gradient and white text.</p>
    </div>

    <div class="p-5 mb-3 bg-primary bg-gradient text-white rounded">
      <h2>bg-primary bg-gradient</h2>
      <p>Primary gradient banner section.</p>
    </div>

    <div class="p-5 mb-3 bg-success bg-gradient text-white rounded">
      <h2>bg-success bg-gradient</h2>
      <p>Success gradient for call-to-action.</p>
    </div>

    <div class="row g-3">
      <div class="col-md-4">
        <div class="p-4 bg-warning bg-gradient rounded text-dark">Warning Gradient</div>
      </div>
      <div class="col-md-4">
        <div class="p-4 bg-danger bg-gradient rounded text-white">Danger Gradient</div>
      </div>
      <div class="col-md-4">
        <div class="p-4 bg-info bg-gradient rounded text-white">Info Gradient</div>
      </div>
    </div>
  </div>
</body>
</html>
