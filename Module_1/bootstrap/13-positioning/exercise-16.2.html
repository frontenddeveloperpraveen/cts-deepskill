<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 16.2 - Overlay Badge</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1>Overlay Badge</h1>
    <div class="row">
      <div class="col-md-4">
        <div class="position-relative d-inline-block">
          <img src="https://via.placeholder.com/300x200" class="img-fluid rounded" alt="Card image">
          <span class="position-absolute top-0 end-0 badge bg-danger m-2">New</span>
        </div>
        <p class="mt-2">Badge at top-right using <code>position-relative</code> on parent and <code>position-absolute top-0 end-0</code> on badge.</p>
      </div>
      <div class="col-md-4">
        <div class="position-relative d-inline-block">
          <img src="https://via.placeholder.com/300x200" class="img-fluid rounded" alt="Card image">
          <span class="position-absolute bottom-0 start-0 badge bg-primary m-2">50% Off</span>
        </div>
        <p class="mt-2">Badge at bottom-left using <code>position-absolute bottom-0 start-0</code>.</p>
      </div>
      <div class="col-md-4">
        <div class="card position-relative">
          <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Card image">
          <span class="position-absolute top-50 start-50 translate-middle badge bg-warning text-dark fs-5">Sale</span>
        </div>
        <p class="mt-2">Centered badge using <code>top-50 start-50 translate-middle</code>.</p>
      </div>
    </div>
  </div>
</body>
</html>
