<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 3.2 - Container, Row, Col</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .demo-col { background: #d1ecf1; border: 1px solid #bee5eb; padding: 1rem; text-align: center; }
  </style>
</head>
<body>
  <div class="container mt-5">
    <h1>Container, Row, Col Classes</h1>
    <div class="row mb-3">
      <div class="col-12 col-md-6"><div class="demo-col">col-12 col-md-6</div></div>
      <div class="col-12 col-md-6"><div class="demo-col">col-12 col-md-6</div></div>
    </div>
    <div class="row mb-3">
      <div class="col"><div class="demo-col">col (auto equal)</div></div>
      <div class="col"><div class="demo-col">col (auto equal)</div></div>
      <div class="col"><div class="demo-col">col (auto equal)</div></div>
    </div>
    <div class="row">
      <div class="col-4"><div class="demo-col">col-4</div></div>
      <div class="col-8"><div class="demo-col">col-8</div></div>
    </div>
  </div>
</body>
</html>
