<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM Manipulation</title>
  <style>
    .event-card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin: 0.5rem 0; background: #f9f9f9; }
    .event-card h3 { margin: 0 0 0.5rem; color: #0056a0; }
    .event-card button { padding: 0.4rem 1rem; background: #28a745; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .event-card button:hover { background: #218838; }
    .event-card .cancel { background: #dc3545; }
    .event-card .cancel:hover { background: #b02a37; }
  </style>
</head>
<body>
  <h1>Dynamic Event List</h1>
  <div id="eventContainer"></div>
  <script>
    var eventsData = [
      { name: "Clean-Up", seats: 10 },
      { name: "Charity Run", seats: 25 },
      { name: "Workshop", seats: 5 }
    ];

    var container = document.querySelector("#eventContainer");

    function renderEvents() {
      container.innerHTML = "";
      eventsData.forEach(function(e, idx) {
        var card = document.createElement("div");
        card.className = "event-card";
        card.innerHTML = "<h3>" + e.name + "</h3><p>Seats: <span id='seats" + idx + "'>" + e.seats + "</span></p>";
        var btn = document.createElement("button");
        btn.textContent = "Register";
        btn.onclick = function() {
          if (e.seats > 0) {
            e.seats--;
            document.getElementById("seats" + idx).textContent = e.seats;
            if (e.seats === 0) btn.disabled = true;
          }
        };
        card.appendChild(btn);
        container.appendChild(card);
      });
    }

    renderEvents();
  </script>
</body>
</html>
