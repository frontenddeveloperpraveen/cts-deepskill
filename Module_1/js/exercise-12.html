<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AJAX & Fetch API</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 2rem auto; padding: 0 1rem; }
    label { display: block; margin-top: 1rem; font-weight: bold; }
    input, select { width: 100%; padding: 0.5rem; margin-top: 0.25rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { margin-top: 1.5rem; padding: 0.75rem 2rem; background: #0056a0; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    .msg { margin-top: 1rem; padding: 1rem; border-radius: 6px; display: none; font-weight: bold; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <h1>AJAX Registration</h1>
  <form id="ajaxForm">
    <label for="ajaxName">Name</label>
    <input type="text" id="ajaxName" required>

    <label for="ajaxEmail">Email</label>
    <input type="email" id="ajaxEmail" required>

    <label for="ajaxEvent">Event</label>
    <select id="ajaxEvent">
      <option value="Clean-Up">Clean-Up</option>
      <option value="Charity Run">Charity Run</option>
      <option value="Workshop">Workshop</option>
    </select>

    <button type="submit">Submit Registration</button>
    <div class="msg" id="ajaxMsg"></div>
  </form>
  <script>
    document.getElementById("ajaxForm").onsubmit = function(e) {
      e.preventDefault();
      var msg = document.getElementById("ajaxMsg");
      msg.style.display = "none";
      msg.className = "msg";

      var data = {
        name: document.getElementById("ajaxName").value,
        email: document.getElementById("ajaxEmail").value,
        event: document.getElementById("ajaxEvent").value
      };

      setTimeout(function() {
        fetch("https://jsonplaceholder.typicode.com/posts", {
          method: "POST",
          body: JSON.stringify(data),
          headers: { "Content-Type": "application/json" }
        })
        .then(function(res) { return res.json(); })
        .then(function() {
          msg.textContent = "Registration submitted successfully! (Simulated)";
          msg.className = "msg success";
          msg.style.display = "block";
          console.log("Sent payload:", data);
        })
        .catch(function(err) {
          msg.textContent = "Submission failed: " + err.message;
          msg.className = "msg error";
          msg.style.display = "block";
        });
      }, 1500);
    };
  </script>
</body>
</html>
