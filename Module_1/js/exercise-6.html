<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arrays & Methods</title>
</head>
<body>
  <h1>Event Array Management</h1>
  <div id="output"></div>
  <script>
    var events = [
      { name: "Community Clean-Up", category: "Environment" },
      { name: "Music Festival", category: "Music" },
      { name: "Jazz Night", category: "Music" },
      { name: "Charity Run", category: "Sports" }
    ];

    events.push({ name: "Baking Workshop", category: "Workshop" });

    var musicEvents = events.filter(function(e) { return e.category === "Music"; });

    var displayCards = events.map(function(e) { return e.name + " (" + e.category + ")"; });

    var out = document.getElementById("output");
    out.innerHTML = "<h3>All Events</h3><ul>";
    displayCards.forEach(function(card) {
      out.innerHTML += "<li>" + card + "</li>";
    });
    out.innerHTML += "</ul><h3>Music Events Only</h3><ul>";
    musicEvents.forEach(function(e) {
      out.innerHTML += "<li>" + e.name + "</li>";
    });
    out.innerHTML += "</ul>";
  </script>
</body>
</html>
