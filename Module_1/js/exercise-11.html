<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Working with Forms</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 2rem auto; padding: 0 1rem; }
    label { display: block; margin-top: 1rem; font-weight: bold; }
    input, select { width: 100%; padding: 0.5rem; margin-top: 0.25rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { margin-top: 1.5rem; padding: 0.75rem 2rem; background: #0056a0; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    .error { color: #dc3545; font-size: 0.9rem; margin-top: 0.25rem; display: none; }
    .success { color: #28a745; font-weight: bold; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Event Registration Form</h1>
  <form id="regForm">
    <label for="name">Name</label>
    <input type="text" id="name" required>
    <div class="error" id="nameError">Name is required</div>

    <label for="email">Email</label>
    <input type="email" id="email" required>
    <div class="error" id="emailError">Valid email is required</div>

    <label for="eventSelect">Select Event</label>
    <select id="eventSelect">
      <option value="">Choose...</option>
      <option value="Clean-Up">Clean-Up</option>
      <option value="Charity Run">Charity Run</option>
      <option value="Workshop">Workshop</option>
    </select>
    <div class="error" id="eventError">Please select an event</div>

    <button type="submit">Register</button>
    <div class="success" id="successMsg"></div>
  </form>
  <script>
    document.getElementById("regForm").onsubmit = function(e) {
      e.preventDefault();
      var valid = true;

      var name = document.getElementById("name").value.trim();
      var email = document.getElementById("email").value.trim();
      var event = document.getElementById("eventSelect").value;

      document.getElementById("nameError").style.display = name ? "none" : "block";
      document.getElementById("emailError").style.display = email && email.includes("@") ? "none" : "block";
      document.getElementById("eventError").style.display = event ? "none" : "block";

      if (!name) valid = false;
      if (!email || !email.includes("@")) valid = false;
      if (!event) valid = false;

      if (valid) {
        document.getElementById("successMsg").textContent = "Registration confirmed for " + name + " at " + event;
      }
    };
  </script>
</body>
</html>
